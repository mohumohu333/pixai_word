<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語管理</title>

<style>
body{
font-family:sans-serif;
padding:20px;
}

input{
margin:5px;
}

button{
margin:5px;
padding:10px;
}

.selected{
background:#4caf50;
color:white;
}

.genre{
margin-top:20px;
}

.genre h3{
background:#eee;
padding:8px;
border-radius:6px;
}
</style>

</head>
<body>

<h2>単語登録</h2>

<input id="ja" placeholder="日本語">
<input id="en" placeholder="英語">
<input id="genre" placeholder="ジャンル">

<button onclick="addWord()">登録</button>

<h2>単語一覧</h2>

<div id="words"></div>

<button onclick="copyWords()">選択した英語をコピー</button>
<button id="editButton" onclick="toggleEditMode()">編集モード</button>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL = "https://zudneeyfdrzxuerddtpy.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1ZG5lZXlmZHJ6eHVlcmRkdHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjY2MDAsImV4cCI6MjA4ODMwMjYwMH0.q7UG4H1JgB0bfZAAp9j-QuFTiKNMIylOUGzyplWouc0"

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let selected = []
let editMode = false

loadWords()

async function addWord(){

const ja = document.getElementById("ja").value
const en = document.getElementById("en").value
const genre = document.getElementById("genre").value

function saveGenreState(genre, isOpen) {

  let state = JSON.parse(localStorage.getItem("genreState") || "{}")

  state[genre] = isOpen

  localStorage.setItem("genreState", JSON.stringify(state))

}


function loadGenreState(genre) {

  let state = JSON.parse(localStorage.getItem("genreState") || "{}")

  return state[genre] || false

}


if(!ja || !en || !genre) return

await client
.from("words")
.insert([{ja,en,genre}])

location.reload()

}

async function loadWords(){

const { data } = await client
.from("words")
.select("*")

const container = document.getElementById("words")
container.innerHTML = ""

let grouped = {}

data.forEach(w=>{

if(!grouped[w.genre]) grouped[w.genre] = []
grouped[w.genre].push(w)

})

for (const genre in grouped) {

  const div = document.createElement("div")
  div.className = "genre"

  const list = document.createElement("div")

  const isOpen = loadGenreState(genre)

  list.style.display = isOpen ? "block" : "none"

  const title = document.createElement("h3")
  title.style.cursor = "pointer"

  title.textContent = (isOpen ? "▼ " : "▶ ") + genre

  title.onclick = () => {

    const nowOpen = list.style.display !== "none"

    if (nowOpen) {

      list.style.display = "none"
      title.textContent = "▶ " + genre
      saveGenreState(genre, false)

    } else {

      list.style.display = "block"
      title.textContent = "▼ " + genre
      saveGenreState(genre, true)

    }

  }

  grouped[genre].forEach(word => {

    const btn = document.createElement("button")
    btn.textContent = word.ja
    btn.onclick = () => toggle(btn, word.en)

    list.appendChild(btn)

  })

  div.appendChild(title)
  div.appendChild(list)
  container.appendChild(div)

}

}

function toggle(btn,en){

btn.classList.toggle("selected")

if(selected.includes(en))
selected = selected.filter(e=>e!==en)
else
selected.push(en)

}

function copyWords(){

const text = selected.join(",")

navigator.clipboard.writeText(text)

alert("コピーしました:\n"+text)

}

function toggleEditMode(){

  editMode = !editMode

  const btn = document.getElementById("editButton")

  if(editMode){
    document.body.style.background = "#fff3cd"
    btn.textContent = "編集終了"
  }else{
    document.body.style.background = ""
    btn.textContent = "編集モード"
  }

  loadWords()

}

async function deleteWord(id){

  if(!confirm("削除しますか？")) return

  await client
  .from("words")
  .delete()
  .eq("id", id)

  loadWords()

}


</script>

</body>

</html>
